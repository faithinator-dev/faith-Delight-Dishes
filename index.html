<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Delight - Food Website</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .herosection {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=80') center/cover no-repeat;
            min-height: 200px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px 20px;
        }
        .herosection h1 {
            color: #fff !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .herosection p {
            color: #f0f0f0 !important;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .filters-box {
            background: white;
            border: 2px solid #dc3545;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }
        .filters-box label {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid container-lg">
            <a class="navbar-brand text-success fw-bold ">Faith<span class="text-danger"> Delight Dishes</span></a>
            <form class="d-flex" role="search" onsubmit="event.preventDefault()">
            <input class="form-control border border-1 border-success me-2" type="search" placeholder="Search" aria-label="Search" id="searchInput"/>
            <button class="btn btn-outline-danger" type="button">Search</button>
            </form>
        </div>
    </nav>
</header>
<main class="container-fluid pt-5">
    <section class="container-lg  herosection text-center bg-">
        <h1 class="fw-bold text-uppercase text-danger fs-1 pt-4">Explore Different sort of Dishes</h1>
        <p class="text-success">Discover the rich flavors of African cuisine</p>
    </section>
    <section class="container-lg mt-5">
        <div class="filters-box d-md-flex align-items-center justify-content-center gap-3 flex-wrap">
            <div class="dropdown my-2">
                <button class="btn border border-1 border-danger dropdown-toggle text-danger px-4 mt-2 my-md-0 col-12 col-md-auto" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    Category    
                </button>
                <ul class="dropdown-menu rounded-1">
                    <li><a class="dropdown-item" href="#" onclick="filterByCategory('All Categories')">All Categories</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filterByCategory('Rice Dishes')">Rice Dishes</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filterByCategory('Soups')">Soups</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filterByCategory('Swallows')">Swallows</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filterByCategory('Snacks/Street Food')">Snacks/Street Food</a></li>
                </ul>
            </div>

            <select name="region" id="Region" class="py-md-2 py-1 my-2 px-4 rounded-pill border border-1 border-success text-success col-12 col-md-auto">
                <option value="All regions">All Regions</option>
                <option value="South-South Nigeria">South-South Nigeria</option>
                <option value="South-West Nigeria">South-West Nigeria</option>
                <option value="Northern Nigeria">Northern Nigeria</option>
                <option value="South-East Nigeria">South-East Nigeria</option>
            </select>

            <div class="form-check my-2">
                <input class="form-check-input" type="checkbox" name="vegetarian" id="vegetarian">
                <label class="form-check-label" for="vegetarian">Vegetarian</label>
            </div>

            <div class="form-check my-2">
                <input class="form-check-input" type="checkbox" name="spicy" id="spicy">
                <label class="form-check-label" for="spicy">Spicy</label>
            </div>
        </div>
    </section>

    <section class="container-lg mt-5" id="show">
        <div class="row g-4 justify-content-center">
            <div class="col-12 text-center">
                <div class="spinner-border text-success">
                    __________<span class="text-danger spinner-border">||||</span>
                </div><br>
                <span class="text-warning">please wait... while we load the food</span>
            </div>
        </div>
    </section>

    <div class="modal position-fixed top-0 start-0 w-100 h-100" id="Modal-Food" style="display: none; background-color: rgba(0,0,0,0.6); z-index: 1050; overflow-y: auto;">
        <div class="modal-content bg-white rounded-4 shadow-lg mx-auto my-5 position-relative" style="max-width: 900px; width: 90%; animation: slideUp 0.3s ease;">
        </div>
    </div>
        
</main>    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    const searchInput = document.getElementById('searchInput');
    let allFoods = []
    let filteredFoods = [];
    let selectedCategory = 'All Categories';
    const foodContainer = document.getElementById('show')
    

    const Apiurl = "https://mongotest2026.vercel.app/api/foods";
    const FoodFetching = async() => {
            const result = fetch(Apiurl)
            const awaitingResult = await result
            console.log(awaitingResult)
            show.innerHTML = ''
            show.innerHTML = 
            ` <div class="text-center w-100">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-warning mt-3">Please wait... loading delicious foods</p>
            </div>
            `
            
            const convertedresult = await awaitingResult.json()
            console.log(convertedresult.data)
            show.innerHTML = '<div class="row g-4"></div>'
             
            convertedresult.data.forEach((food) => {
                allFoods.push(food)
                console.log('Food region:', food.region, 'Category:', food.category)
            })

            displayFoods(allFoods)
            filterAll()
        }
        
        FoodFetching()

    showFoodDetails = (id) => { 
        const food = allFoods.find(f => f.id === id);
        if (!food) return;
        
        const modal = document.getElementById('Modal-Food');
        const modalContent = modal.querySelector('.modal-content');

        modalContent.innerHTML = `
            <div class="position-relative p-4">
                <button class="btn-close position-absolute top-0 end-0 m-3" onclick="closeModal()"></button>
                
                <div class="row">
                    <div class="col-md-6">
                        <img src="${food.image || 'https://via.placeholder.com/400?text=' + food.name}" 
                             class="img-fluid rounded shadow" 
                             alt="${food.name}">
                    </div>
                    <div class="col-md-6">
                        <h2 class="text-danger fw-bold mb-3">${food.name}</h2>
                        <p class="text-muted"><strong>Category:</strong> ${food.category || 'N/A'}</p>
                        <p class="text-muted"><strong>Region:</strong> ${food.region || 'N/A'}</p>
                        
                        <div class="d-flex gap-2 mb-3">
                            ${food.vegetarian ? '<span class="badge bg-success">Vegetarian</span>' : ''}
                            ${food.spicy ? '<span class="badge bg-danger">Spicy</span>' : ''}
                        </div>
                        
                        <p class="mb-3">${food.description || 'Delicious traditional dish'}</p>
                        
                        ${food.ingredients ? `
                            <h5 class="text-success mt-3">Ingredients:</h5>
                            <ul class="list-unstyled">
                                ${food.ingredients.map(ing => '<li>• ' + ing + '</li>').join('')}
                            </ul>
                        ` : ''}
                        
                        ${food.preparation ? `
                            <h5 class="text-success mt-3">Preparation:</h5>
                            <p>${food.preparation}</p>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
        
        modal.style.display = 'flex';
    }

    closeModal = () => {
        const modal = document.getElementById('Modal-Food');
        modal.style.display = 'none';
    }

    document.getElementById('Modal-Food').addEventListener('click', (e) => {
        if (e.target.id === 'Modal-Food') {
            closeModal();
        }
    })

    function displayFoods(foodsToDisplay) {
        const rowContainer = show.querySelector('.row');
        
        if (foodsToDisplay.length === 0) {
            rowContainer.innerHTML = '<div class="col-12 text-center"><p class="text-muted fs-5 mt-4">No foods found matching your filters</p></div>';
            return;
        }
        
        rowContainer.innerHTML = '';
        foodsToDisplay.forEach(food => {
            rowContainer.innerHTML += `
                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card h-100 shadow-sm border-0">
                        <img src="${food.image || 'https://via.placeholder.com/300x200?text=' + food.name}" 
                             class="card-img-top" 
                             alt="${food.name}" 
                             style="height: 200px; object-fit: cover;">
                        <div class="card-body">
                            <h5 class="card-title text-danger">${food.name}</h5>
                            <p class="card-text text-muted small">${food.category || 'N/A'}</p>
                            <div class="d-flex gap-2 flex-wrap">
                                ${food.vegetarian ? '<span class="badge bg-success">Vegetarian</span>' : ''}
                                ${food.spicy ? '<span class="badge bg-danger">Spicy</span>' : ''}
                                ${food.region ? '<span class="badge bg-info">' + food.region + '</span>' : ''}
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <button class="btn btn-outline-success w-100" onclick="showFoodDetails(${food.id})">
                                Details
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const region = document.getElementById('Region').value;
        const isVegetarian = document.getElementById('vegetarian').checked;
        const isSpicy = document.getElementById('spicy').checked;
        const category = selectedCategory;
        
        console.log('Filters applied:', {searchTerm, region, isVegetarian, isSpicy, category});
        
        let filtered = allFoods;
        
        if (searchTerm) {
            filtered = filtered.filter(food => 
                food.name.toLowerCase().includes(searchTerm)
            );
        }
        
        if (region && region !== 'All regions') {
            filtered = filtered.filter(food => 
                food.region && food.region.toLowerCase().includes(region.toLowerCase())
            );
        } 
        
        if (isVegetarian) {
            filtered = filtered.filter(food => 
                food.vegetarian === true || food.vegetarian === 'true' || food.vegetarian === 'Yes'
            );
        }
        
        if (isSpicy) {
            filtered = filtered.filter(food => 
                food.spicy === true || food.spicy === 'true' || food.spicy === 'Yes'
            );
        }
        
        if (category && category !== 'All Categories') {
            filtered = filtered.filter(food => 
                food.category && food.category.toLowerCase().includes(category.toLowerCase())
            );
        }
        
        console.log('Filtered results:', filtered.length, 'foods')
        displayFoods(filtered);
    }

    function filterByCategory(category) {
        selectedCategory = category;
        applyFilters();
    }

    function filterAll() {
        document.getElementById('searchInput').addEventListener('keyup', applyFilters);
        document.getElementById('Region').addEventListener('change', applyFilters);
        document.getElementById('vegetarian').addEventListener('change', applyFilters);
        document.getElementById('spicy').addEventListener('change', applyFilters);
    }


</script>
</html>
